apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "shopware-k3s.fullname" . }}-nginx
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /var/www/html/public;
      index index.php index.html;

      client_max_body_size {{ .Values.shopware.phpUploadLimit }};

      location / {
        try_files $uri /index.php$is_args$args;
      }

      location ~ ^/index\.php(/|$) {
        fastcgi_pass {{ include "shopware-k3s.fullname" . }}-app:{{ .Values.app.service.port }};
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
      }

      location ~ \.php$ {
        return 404;
      }

      location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        access_log off;
      }
    }
