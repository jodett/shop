apiVersion: v1
kind: Service
metadata:
  name: {{ include "shopware-k3s.fullname" . }}-nginx
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.nginx.service.type }}
  selector:
    {{- include "shopware-k3s.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: http
      protocol: TCP
