{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "shopware-k3s.fullname" . }}
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "shopware-k3s.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from: []
  egress:
    - {}
{{- end }}
