{{- if .Values.startupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "shopware-k3s.fullname" . }}-startup
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
  # No helm hook: job is created with the release so worker/cron initContainers can wait for it
spec:
  backoffLimit: {{ .Values.startupJob.backoffLimit }}
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: startup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              set -e
              php -d memory_limit=1G /var/www/html/bin/console system:install --basic-setup --create-database --force || true
              php -d memory_limit=1G /var/www/html/bin/console database:migrate --all
              php -d memory_limit=1G /var/www/html/bin/console cache:clear
          envFrom:
            - secretRef:
                name: {{ include "shopware-k3s.fullname" . }}-env
          volumeMounts:
            - name: media
              mountPath: /var/www/html/public/media
            - name: media
              mountPath: /var/www/html/files
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-media" (include "shopware-k3s.fullname" .)) .Values.persistence.media.existingClaim }}
{{- end }}
