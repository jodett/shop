{{- if .Values.startupJob.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "shopware-k3s.fullname" . }}-startup-waiter
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "shopware-k3s.fullname" . }}-startup-waiter
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "shopware-k3s.fullname" . }}-startup-waiter
subjects:
  - kind: ServiceAccount
    name: {{ include "shopware-k3s.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
