{{- if .Values.shopware.cron.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "shopware-k3s.fullname" . }}-scheduled-task
  labels:
    {{- include "shopware-k3s.labels" . | nindent 4 }}
    app.kubernetes.io/component: cron
spec:
  schedule: {{ .Values.shopware.cron.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "shopware-k3s.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: cron
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "shopware-k3s.serviceAccountName" . }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- if .Values.startupJob.enabled }}
          initContainers:
            - name: wait-for-startup
              image: {{ .Values.startupJob.waitImage | quote }}
              command:
                - sh
                - -c
                - |
                  echo "Waiting for startup job {{ include "shopware-k3s.fullname" . }}-startup..."
                  kubectl wait --for=condition=complete job/{{ include "shopware-k3s.fullname" . }}-startup -n {{ .Release.Namespace }} --timeout={{ .Values.startupJob.waitTimeout }}s
                  echo "Startup job completed."
          {{- end }}
          containers:
            - name: scheduled-task
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              command:
                - php
                - /var/www/html/bin/console
                - scheduled-task:run
                - --no-wait
                - --no-interaction
              envFrom:
                - secretRef:
                    name: {{ include "shopware-k3s.fullname" . }}-env
              volumeMounts:
                - name: media
                  mountPath: /var/www/html/public/media
                - name: media
                  mountPath: /var/www/html/files
              resources:
                {{- toYaml .Values.cron.resources | nindent 16 }}
          volumes:
            - name: media
              persistentVolumeClaim:
                claimName: {{ default (printf "%s-media" (include "shopware-k3s.fullname" .)) .Values.persistence.media.existingClaim }}
{{- end }}
