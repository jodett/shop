name: Build & push shopware image

on:
  push:
    branches: ["main", "master"]
    paths:
      - "Dockerfile"
      # If you later add build context files outside Dockerfile, extend this list.
  pull_request:
    paths:
      - "Dockerfile"
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/shopware

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Node.js (for semantic-release)
        if: github.event_name != 'pull_request'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic version (Conventional Commits)
        id: semrel
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags --force
          prev_tag="$(git describe --tags --match 'shopware-v*' --abbrev=0 2>/dev/null || true)"
          echo "prev_tag=$prev_tag"

          npm install --no-save \
            semantic-release@23 \
            @semantic-release/commit-analyzer@12 \
            @semantic-release/release-notes-generator@13 \
            @semantic-release/github@11

          npx semantic-release -e .releaserc.shopware.json || true

          git fetch --tags --force
          new_tag="$(git describe --tags --match 'shopware-v*' --abbrev=0 2>/dev/null || true)"
          echo "new_tag=$new_tag"

          if [ -n "$new_tag" ] && [ "$new_tag" != "$prev_tag" ]; then
            version="${new_tag#shopware-v}"
            echo "released_version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Version tag from git tag (if present)
        id: gittag
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          tag="$(git tag --points-at HEAD | grep -E '^shopware-v[0-9]+\\.[0-9]+\\.[0-9]+' | head -n 1 || true)"
          if [ -n "$tag" ]; then
            echo "version=${tag#shopware-v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute docker tag list
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          echo "base_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${{ steps.meta.outputs.tags }}" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Prefer an explicit git tag (shopware-vX.Y.Z), then a semantic-release release version.
          version="${{ steps.gittag.outputs.version || '' }}"
          if [ -z "$version" ]; then version="${{ steps.semrel.outputs.released_version || '' }}"; fi

          if [ -n "$version" ]; then
            echo "version_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # No release happened. Tag as "next potential version" with an alpha prerelease.
          # Example: 1.2.4-alpha.123.gabc1234
          last="0.0.0"
          if tag="$(git describe --tags --match 'shopware-v*' --abbrev=0 2>/dev/null)"; then
            last="${tag#shopware-v}"
          fi
          IFS='.' read -r major minor patch <<< "$last"
          major="${major:-0}"; minor="${minor:-0}"; patch="${patch:-0}"
          next_patch="$((patch + 1))"
          sha="$(git rev-parse --short=7 HEAD)"
          alpha="${major}.${minor}.${next_patch}-alpha.${GITHUB_RUN_NUMBER}.g${sha}"
          echo "version_tag=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${alpha}" >> "$GITHUB_OUTPUT"

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.tags.outputs.base_tags }}
            ${{ steps.tags.outputs.version_tag }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

